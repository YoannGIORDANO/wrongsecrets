name: DevSecOps Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ----- 1. BARRIERE DE SECURITE : detection des secrets -----
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Scanner les secrets
        run: gitleaks dir . -v --report-format sarif --report-path gitleaks.sarif

      - name: Envoyer le rapport dans l'onglet Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Conserver le rapport (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif-report
          path: gitleaks.sarif

  # ----- 2. BUILD & TEST de l'application -----
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build (compilation + packaging)
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean package -DskipTests -Ddependency-check.skip=true -Dmaven.compiler.release=21

      - name: Tests unitaires (non bloquants)
        continue-on-error: true
        run: ./mvnw -B -ntp test -Ddependency-check.skip=true -Dmaven.compiler.release=21

      - name: Conserver l'application compilee (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          if-no-files-found: warn

  # ----- 3. SCAN des secrets et des mauvaises configurations (IaC) -----
  trivy-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Trivy
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Trivy (secrets, sans analyse des dependances)
        run: trivy fs . --scanners secret --skip-files "**/pom.xml" --format sarif --output trivy-secret.sarif

      - name: Scan Trivy (mauvaises configurations IaC)
        run: trivy config . --format sarif --output trivy-config.sarif

      - name: Envoyer le rapport secrets dans l'onglet Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secret.sarif
          category: trivy-secret

      - name: Envoyer le rapport misconfig dans l'onglet Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Conserver les rapports (artefacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-secret.sarif
            trivy-config.sarif
            
# ----- 4. RELEASE : construire et publier l'image Docker sur GHCR -----
  release:
    name: Build & Publish Image (GHCR)
    runs-on: ubuntu-latest
    needs: build-and-test          # ne publie que si le build a reussi
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write              # autorisation de publier sur GHCR
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compiler l'application (JAR)
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean package -DskipTests -Ddependency-check.skip=true -Dmaven.compiler.release=21

      - name: Convertir le nom du depot en minuscules
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Se connecter a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et publier l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}
